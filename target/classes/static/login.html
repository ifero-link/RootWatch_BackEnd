<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | RootWPSP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background: var(--card);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 { color: var(--primary); margin-bottom: 10px; }
        p { color: #64748b; font-size: 0.9rem; margin-bottom: 25px; }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            box-sizing: border-box; /* Importante para que no se salga del borde */
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background-color: #1d4ed8; }

        .footer-links {
            margin-top: 20px;
            font-size: 0.85rem;
        }

        .footer-links a {
            color: var(--primary);
            text-decoration: none;
        }

        .error-msg {
            color: #ef4444;
            background: #fee2e2;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Bienvenido</h2>
        <p>Introduce tus credenciales para acceder</p>

        <script>
            if (window.location.search.includes("error")) {
                document.write('<div class="error-msg">Usuario o contraseña incorrectos</div>');
            }
        </script>

        <form action="/login" method="post">
            <input type="text" name="username" placeholder="Nombre de usuario" required autofocus>
            <input type="password" name="password" placeholder="Contraseña" required>
            
            <button type="submit">Entrar al Panel</button>
        </form>

        <div class="footer-links">
            ¿No tienes cuenta? <a href="/registro.html">Regístrate aquí</a>
        </div>
    </div>

</body>
</html>
